services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conference_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d conference_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so the container resolves the 'db' service hostname
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/conference_bot
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source so alembic revision files written inside the container
      # appear on the host immediately (useful for first-time migration generation)
      - .:/app

volumes:
  postgres_data:
